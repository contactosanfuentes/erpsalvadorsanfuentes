<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Grupo Guías y Scouts Salvador Sanfuentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Raleway:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap');

        :root {
            --azul-profundo: #0E2586;
            --rojo-intenso: #F80202;
            --verde: #859F04;
            --amarillo: #FFD100;
            --morado: #8B5CF6;
            --marron-oscuro: #4E110B;
            --gris-claro: #f0f2f5;
            --blanco: #ffffff;
            --gris-oscuro: #333;
            --border-color: #ddd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://i.imgur.com/MpmoQR3.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            position: relative;
            overflow: hidden;
            margin-right: 5%;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, 
                var(--verde) 20%, 
                var(--azul-profundo) 20% 40%, 
                var(--rojo-intenso) 40% 60%, 
                var(--amarillo) 60% 80%,
                var(--morado) 80%);
        }

        .header-logos {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .header-logos img {
            height: 60px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .header-logos h2 {
            font-family: 'Raleway', sans-serif;
            font-size: 1.2rem;
            color: var(--azul-profundo);
            text-align: center;
            line-height: 1.3;
            margin: 0 10px;
        }

        h1 {
            font-family: 'Raleway', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--azul-profundo);
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--gris-oscuro);
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--azul-profundo);
            font-size: 1.1rem;
            opacity: 0.7;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Open Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--gris-claro);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--azul-profundo);
            box-shadow: 0 0 0 3px rgba(14,37,134,0.1);
            background: var(--blanco);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--azul-profundo), var(--rojo-intenso));
            border: none;
            border-radius: 10px;
            color: var(--blanco);
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14,37,134,0.3);
        }

        .login-btn i {
            font-size: 1.2rem;
        }

        .error-message {
            color: var(--rojo-intenso);
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            background: rgba(248,2,2,0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(248,2,2,0.3);
            display: none;
        }

        .footer-text {
            margin-top: 25px;
            text-align: center;
            color: var(--gris-oscuro);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .footer-text i {
            color: var(--amarillo);
        }

        .fleur {
            text-align: center;
            margin-bottom: 10px;
        }
        .fleur i {
            color: var(--verde);
            font-size: 1.5rem;
            opacity: 0.6;
        }


        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0; color: #94a3b8; font-size: 0.82rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border-color);
        }

        .google-btn {
            width: 100%; padding: 13px; background: white;
            border: 2px solid #e2e8f0; border-radius: 10px;
            color: #374151; font-family: 'Poppins', sans-serif;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }
        .google-btn:hover {
            border-color: #4285F4; background: #f8faff;
            box-shadow: 0 4px 12px rgba(66,133,244,0.15);
            transform: translateY(-1px);
        }
        .google-btn img {
            width: 22px; height: 22px;
        }
        .google-btn .dominio {
            font-size: 0.72rem; color: #64748b;
            font-weight: 400; margin-left: 2px;
        }
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(14,37,134,0.85);
            z-index: 9999; display: none; align-items: center;
            justify-content: center; flex-direction: column; gap: 16px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { color: white; font-size: 0.95rem; font-weight: 600; }

        @media (max-width: 768px) {
            body {
                justify-content: center;
                padding: 10px;
            }
            .login-card {
                margin-right: 0;
                max-width: 95%;
            }
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0E2586">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ERP Scout">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p>Verificando con Google Workspace...</p>
    </div>

    <div class="login-card">
        <div class="header-logos">
            <img src="https://i.imgur.com/11u9rUD.png" alt="Logo izquierdo">
            <h2>GRUPO DE GUÍAS Y SCOUTS<br>SALVADOR SANFUENTES</h2>
            <img src="https://i.imgur.com/DcxzvpX.png" alt="Logo derecho">
        </div>

        <div class="fleur">
            <i class="fas fa-fleur-de-lis"></i>
        </div>

        <h1>ACCESO AL SISTEMA</h1>
        <div class="subtitle">Ingrese sus credenciales</div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Correo electrónico" autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Contraseña">
        </div>

        <button class="login-btn" id="loginButton">
            <i class="fas fa-sign-in-alt"></i> INGRESAR
        </button>

        
        <div class="divider">o continúa con</div>

        <button class="google-btn" id="googleBtn" onclick="loginConGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Iniciar sesión con Google
            <span class="dominio">@salvadorsanfuentes.org</span>
        </button>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i> Correo o contraseña incorrectos
        </div>

        <div class="footer-text">
            <i class="fas fa-circle"></i> Siempre listos para servir  <i class="fas fa-circle"></i>
        </div>
        <div style="text-align:center;margin-top:14px;">
            <a href="https://www.netlify.com" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;color:rgba(255,255,255,0.55);text-decoration:none;font-weight:500;">
                This site is powered by
                <img src="https://www.netlify.com/v3/img/components/netlify-color-accent.svg" alt="Netlify" style="height:16px;vertical-align:middle;">
            </a>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://hyixmaxhoxvamoecuars.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5aXhtYXhob3h2YW1vZWN1YXJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTg1NDMsImV4cCI6MjA4ODM3NDU0M30.ZLeJIWdip2f00h4TqkZH7eqMX4wpwphaqkJpAa0N0X4';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


        // ═══ GOOGLE SSO ═══
        async function loginConGoogle() {
            const overlay = document.getElementById('loadingOverlay');
            const googleBtn = document.getElementById('googleBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            overlay.classList.add('active');
            googleBtn.disabled = true;
            errorDiv.style.display = 'none';
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: 'https://salvadorsanfuentes-erp.netlify.app/index.html',
                        queryParams: {
                            hd: 'salvadorsanfuentes.org',  // Restringir dominio
                            prompt: 'select_account'
                        }
                    }
                });
                
                if (error) {
                    overlay.classList.remove('active');
                    googleBtn.disabled = false;
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error al conectar con Google: ' + error.message;
                }
                // Si no hay error, Google redirige automáticamente
            } catch(e) {
                overlay.classList.remove('active');
                googleBtn.disabled = false;
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error inesperado';
            }
        }

        // Manejar callback OAuth y sesión existente
        (async function() {
            const overlay = document.getElementById('loadingOverlay');
            const hash = window.location.hash;
            const params = new URLSearchParams(window.location.search);

            // Si hay tokens en el hash (callback de Google OAuth)
            if (hash.includes('access_token')) {
                overlay.classList.add('active');
                // Supabase JS procesa el hash automáticamente
                setTimeout(async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session) {
                        window.location.href = 'index.html';
                    } else {
                        overlay.classList.remove('active');
                    }
                }, 800);
                return;
            }

            // Si venimos del código de autorización OAuth
            if (params.get('code')) {
                overlay.classList.add('active');
                const { data, error } = await supabaseClient.auth.exchangeCodeForSession(params.get('code'));
                if (data?.session) { window.location.href = 'index.html'; return; }
                overlay.classList.remove('active');
                return;
            }

            // Si ya hay sesión activa, ir directo al ERP
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) window.location.href = 'index.html';
        })();

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            if (!email || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Complete todos los campos';
                return;
            }

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                console.error('Error de login:', error);
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Correo o contraseña incorrectos';
                document.querySelector('.login-card').style.animation = 'shake 0.3s ease';
                setTimeout(() => {
                    document.querySelector('.login-card').style.animation = '';
                }, 300);
            } else {
                // *** MODIFICACIÓN: redirige a index.html ***
                window.location.href = 'index.html';
            }
        }

        document.getElementById('loginButton').addEventListener('click', login);
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                50% { transform: translateX(5px); }
                75% { transform: translateX(-3px); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

// ── PWA Install Prompt (mejorado) ──
let deferredInstallPrompt = null;
const yaInstalada = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
const esIOS = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase()) && !window.MSStream;

// Android/Chrome: captura el evento de instalación
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    if (!yaInstalada) {
        setTimeout(() => mostrarBannerInstalar(false), 1500);
    }
});

// iOS Safari: no dispara beforeinstallprompt, mostramos instrucciones manuales
if (esIOS && !yaInstalada && !localStorage.getItem('pwa-install-dismissed')) {
    window.addEventListener('load', () => setTimeout(() => mostrarBannerInstalar(true), 2000));
}

function mostrarBannerInstalar(modoIOS) {
    if (document.getElementById('pwa-install-banner')) return;
    if (localStorage.getItem('pwa-install-dismissed')) {
        // Si lo descartó hace más de 3 días, mostrar de nuevo
        const dismissed = parseInt(localStorage.getItem('pwa-install-dismissed'));
        if (Date.now() - dismissed < 3 * 24 * 60 * 60 * 1000) return;
    }
    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = 'position:fixed;bottom:20px;left:20px;right:20px;max-width:440px;margin:0 auto;background:linear-gradient(135deg,#0E2586,#1e3a8a);color:white;padding:16px 18px;border-radius:16px;box-shadow:0 12px 35px rgba(0,0,0,0.4);z-index:99999;font-family:sans-serif;animation:slideUp 0.4s ease-out;';

    if (modoIOS) {
        banner.innerHTML = `
            <div style="display:flex;align-items:flex-start;gap:12px;">
                <img src="/icon-192.png" style="width:46px;height:46px;border-radius:11px;background:white;padding:3px;flex-shrink:0;">
                <div style="flex:1;min-width:0;">
                    <p style="margin:0;font-weight:800;font-size:0.95rem;">Instalar como App</p>
                    <p style="margin:4px 0 0;font-size:0.78rem;opacity:0.9;line-height:1.4;">Toca <b>Compartir</b> <span style="font-size:1.1rem;">&#x2191;</span> y luego <b>"Añadir a pantalla de inicio"</b></p>
                </div>
                <button id="pwa-install-close" style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:0.85rem;flex-shrink:0;">✕</button>
            </div>`;
    } else {
        banner.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;">
                <img src="/icon-192.png" style="width:46px;height:46px;border-radius:11px;background:white;padding:3px;flex-shrink:0;">
                <div style="flex:1;min-width:0;">
                    <p style="margin:0;font-weight:800;font-size:0.95rem;">Instalar como App</p>
                    <p style="margin:2px 0 0;font-size:0.78rem;opacity:0.85;line-height:1.3;">Acceso rápido desde tu pantalla de inicio.</p>
                </div>
                <button id="pwa-install-btn" style="background:#FFD100;color:#0E2586;border:none;border-radius:10px;padding:9px 16px;font-weight:800;font-size:0.85rem;cursor:pointer;white-space:nowrap;">Instalar</button>
                <button id="pwa-install-close" style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:0.85rem;flex-shrink:0;">✕</button>
            </div>`;
    }
    document.body.appendChild(banner);

    if (!document.getElementById('pwa-anim-style')) {
        const style = document.createElement('style');
        style.id = 'pwa-anim-style';
        style.textContent = '@keyframes slideUp{from{transform:translateY(120%);opacity:0}to{transform:translateY(0);opacity:1}}';
        document.head.appendChild(style);
    }

    const btnInstall = document.getElementById('pwa-install-btn');
    if (btnInstall) {
        btnInstall.onclick = async () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            const { outcome } = await deferredInstallPrompt.userChoice;
            if (outcome === 'accepted') banner.remove();
            deferredInstallPrompt = null;
        };
    }
    document.getElementById('pwa-install-close').onclick = () => {
        localStorage.setItem('pwa-install-dismissed', Date.now());
        banner.remove();
    };
}

window.addEventListener('appinstalled', () => {
    document.getElementById('pwa-install-banner')?.remove();
    localStorage.removeItem('pwa-install-dismissed');
});
</script>
</body>
</html>
