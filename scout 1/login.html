<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Grupo Guías y Scouts Salvador Sanfuentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Raleway:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap');

        :root {
            --azul-profundo: #0E2586;
            --rojo-intenso: #F80202;
            --verde: #859F04;
            --amarillo: #FFD100;
            --morado: #8B5CF6;
            --marron-oscuro: #4E110B;
            --gris-claro: #f0f2f5;
            --blanco: #ffffff;
            --gris-oscuro: #333;
            --border-color: #ddd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://i.imgur.com/MpmoQR3.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            position: relative;
            overflow: hidden;
            margin-right: 5%;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, 
                var(--verde) 20%, 
                var(--azul-profundo) 20% 40%, 
                var(--rojo-intenso) 40% 60%, 
                var(--amarillo) 60% 80%,
                var(--morado) 80%);
        }

        .header-logos {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .header-logos img {
            height: 60px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .header-logos h2 {
            font-family: 'Raleway', sans-serif;
            font-size: 1.2rem;
            color: var(--azul-profundo);
            text-align: center;
            line-height: 1.3;
            margin: 0 10px;
        }

        h1 {
            font-family: 'Raleway', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--azul-profundo);
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--gris-oscuro);
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--azul-profundo);
            font-size: 1.1rem;
            opacity: 0.7;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Open Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--gris-claro);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--azul-profundo);
            box-shadow: 0 0 0 3px rgba(14,37,134,0.1);
            background: var(--blanco);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--azul-profundo), var(--rojo-intenso));
            border: none;
            border-radius: 10px;
            color: var(--blanco);
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14,37,134,0.3);
        }

        .login-btn i {
            font-size: 1.2rem;
        }

        .error-message {
            color: var(--rojo-intenso);
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            background: rgba(248,2,2,0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(248,2,2,0.3);
            display: none;
        }

        .footer-text {
            margin-top: 25px;
            text-align: center;
            color: var(--gris-oscuro);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .footer-text i {
            color: var(--amarillo);
        }

        .fleur {
            text-align: center;
            margin-bottom: 10px;
        }
        .fleur i {
            color: var(--verde);
            font-size: 1.5rem;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            body {
                justify-content: center;
                padding: 10px;
            }
            .login-card {
                margin-right: 0;
                max-width: 95%;
            }
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0E2586">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ERP Scout">
</head>
<body>
    <div class="login-card">
        <div class="header-logos">
            <img src="https://i.imgur.com/11u9rUD.png" alt="Logo izquierdo">
            <h2>GRUPO DE GUÍAS Y SCOUTS<br>SALVADOR SANFUENTES</h2>
            <img src="https://i.imgur.com/DcxzvpX.png" alt="Logo derecho">
        </div>

        <div class="fleur">
            <i class="fas fa-fleur-de-lis"></i>
        </div>

        <h1>ACCESO AL SISTEMA</h1>
        <div class="subtitle">Ingrese sus credenciales</div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Correo electrónico" autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Contraseña">
        </div>

        <button class="login-btn" id="loginButton">
            <i class="fas fa-sign-in-alt"></i> INGRESAR
        </button>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i> Correo o contraseña incorrectos
        </div>

        <div class="footer-text">
            <i class="fas fa-circle"></i> Siempre listos para servir  <i class="fas fa-circle"></i>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://hyixmaxhoxvamoecuars.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5aXhtYXhob3h2YW1vZWN1YXJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTg1NDMsImV4cCI6MjA4ODM3NDU0M30.ZLeJIWdip2f00h4TqkZH7eqMX4wpwphaqkJpAa0N0X4';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            if (!email || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Complete todos los campos';
                return;
            }

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                console.error('Error de login:', error);
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Correo o contraseña incorrectos';
                document.querySelector('.login-card').style.animation = 'shake 0.3s ease';
                setTimeout(() => {
                    document.querySelector('.login-card').style.animation = '';
                }, 300);
            } else {
                // *** MODIFICACIÓN: redirige a index.html ***
                window.location.href = 'index.html';
            }
        }

        document.getElementById('loginButton').addEventListener('click', login);
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                50% { transform: translateX(5px); }
                75% { transform: translateX(-3px); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}</script>
</body>
</html>
