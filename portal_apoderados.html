<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Apoderados — Grupo Scout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        :root{--azul-profundo:#0E2586;--azul-claro:#3498db;--marron-oscuro:#4E110B;--gris-fondo:#f4f7f9;--gris-claro:#e2e8f0;--blanco:#ffffff;--texto-oscuro:#2d3748;--texto-claro:#718096;--border-color:#cbd5e0;--amarillo:#FFD100;--color-manada:#FFD100;--color-tropa:#00853F;--color-compania:#00853F;--color-pioneros:#0055A5;--color-caminantes:#E31837;--verde:#00853F;--rojo:#E31837;--naranja:#e67e22;--morado:#8b5cf6;--success:#2ecc71;--warning:#f39c12;--danger:#E31837;--info:#3498db;--area-corp:#3498db;--area-crea:#f1c40f;--area-cara:#E31837;--area-afec:#e67e22;--area-soci:#9b59b6;--area-espi:#2ecc71;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:var(--gris-fondo);min-height:100vh;color:var(--texto-oscuro);}

        /* Header */
        .header{background:linear-gradient(135deg,var(--azul-profundo) 0%,#1a36a8 60%,#2962c9 100%);color:white;}
        .hi{padding:32px 26px 50px;text-align:center;}
        .lc{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.15);margin:0 auto 13px;display:flex;align-items:center;justify-content:center;}
        .lc img{width:50px;}
        .header h1{font-size:1.4rem;font-weight:700;margin-bottom:5px;}
        .header p{font-size:0.86rem;opacity:0.8;}

        .wrapper{max-width:780px;margin:0 auto;padding:0 14px 60px;}

        .sc{background:white;border-radius:14px;padding:22px 22px;box-shadow:0 5px 20px rgba(0,0,0,0.09);margin-top:-26px;position:relative;z-index:1;margin-bottom:16px;}
        .sc h2{font-size:0.95rem;font-weight:600;color:var(--azul-profundo);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
        .sr{display:flex;gap:9px;}
        .sr input{flex:1;padding:11px 14px;border:2px solid var(--gris-claro);border-radius:10px;font-size:0.92rem;outline:none;font-family:inherit;transition:0.18s;}
        .sr input:focus{border-color:var(--azul-claro);}

        .btn{padding:11px 18px;border:none;border-radius:10px;font-size:0.88rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.18s;}
        .btn-p{background:var(--azul-profundo);color:white;}
        .btn-p:hover{background:#1a36a8;transform:translateY(-1px);box-shadow:0 4px 11px rgba(14,37,134,0.28);}
        .btn-p:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none;}

        .aviso{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:11px 14px;font-size:0.81rem;color:#92400e;display:flex;gap:8px;align-items:flex-start;margin-bottom:14px;}

        /* TARJETA JOVEN */
        .jcard{background:white;border-radius:14px;padding:0;box-shadow:0 3px 14px rgba(0,0,0,0.07);margin-bottom:16px;animation:fi 0.28s ease;overflow:hidden;}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* Header tarjeta */
        .jh-card{background:linear-gradient(135deg,var(--azul-profundo),#1a36a8);padding:18px 22px;color:white;display:flex;align-items:center;gap:14px;}
        .av{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:white;flex-shrink:0;border:3px solid rgba(255,255,255,0.3);overflow:hidden;}
        .av img{width:100%;height:100%;object-fit:cover;}
        .jinfo h2{font-size:1.05rem;font-weight:700;}
        .jinfo p{font-size:0.83rem;opacity:0.85;margin-top:1px;}
        .badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
        .b{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:14px;font-size:0.7rem;font-weight:600;background:rgba(255,255,255,0.18);color:white;}
        .b-warn{background:#fbbf24;color:#78350f;}
        .b-ok{background:#86efac;color:#166534;}

        /* Tabs internas */
        .tabs-int{display:flex;gap:0;background:#f8fafc;border-bottom:1px solid var(--gris-claro);overflow-x:auto;}
        .tab-int{flex:1;min-width:90px;padding:11px 8px;border:none;background:transparent;font-size:0.78rem;font-weight:600;color:var(--texto-claro);cursor:pointer;transition:0.18s;border-bottom:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;}
        .tab-int:hover{background:#eef3ff;color:var(--azul-profundo);}
        .tab-int.act{color:var(--azul-profundo);background:white;border-bottom-color:var(--azul-profundo);}
        .tab-int i{font-size:0.9rem;}

        .tab-content{padding:18px 22px;display:none;}
        .tab-content.act{display:block;}

        /* GRIDS DE INFO */
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
        .info-grid.full{grid-template-columns:1fr;}
        .ib{background:var(--gris-fondo);border-radius:9px;padding:10px 13px;}
        .ib.full{grid-column:1/-1;}
        .ib .l{font-size:0.7rem;color:var(--texto-claro);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px;font-weight:600;}
        .ib .v{font-size:0.87rem;font-weight:600;color:var(--texto-oscuro);word-break:break-word;}
        .ib.warn{background:#fff7ed;border:1px solid #fed7aa;}
        .ib.warn .v{color:#9a3412;}
        .ib.ok{background:#f0fdf4;border:1px solid #bbf7d0;}
        .ib.ok .v{color:#166534;}
        .ib.danger{background:#fff5f5;border:1px solid #fca5a5;}
        .ib.danger .v{color:#991b1b;}

        .sec{margin-top:14px;}
        .sec:first-child{margin-top:0;}
        .sec-titulo{font-size:0.78rem;font-weight:700;color:var(--azul-profundo);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:9px;display:flex;align-items:center;gap:6px;padding-bottom:5px;border-bottom:2px solid #eef3ff;}

        /* Lista eventos */
        .ev-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--gris-fondo);border-radius:9px;margin-bottom:6px;}
        .ev-row:last-child{margin-bottom:0;}
        .ev-nom{font-size:0.86rem;font-weight:600;}
        .ev-fch{font-size:0.75rem;color:var(--texto-claro);margin-top:1px;}
        .ev-est{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.86rem;flex-shrink:0;}
        .ev-pres{background:#dcfce7;color:#166534;}
        .ev-pend{background:#fff7ed;color:#9a3412;}

        /* Pagos / movimientos */
        .pago-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--gris-fondo);border-radius:9px;margin-bottom:6px;gap:10px;}
        .pago-row:last-child{margin-bottom:0;}
        .pago-info{flex:1;min-width:0;}
        .pago-desc{font-size:0.85rem;font-weight:600;}
        .pago-fch{font-size:0.74rem;color:var(--texto-claro);margin-top:1px;}
        .pago-monto{font-size:0.92rem;font-weight:700;color:var(--verde);white-space:nowrap;}

        /* Progresión */
        .prog-bar-area{margin-bottom:8px;}
        .prog-bar-lbl{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--texto-oscuro);margin-bottom:3px;}
        .prog-bar-lbl strong{font-weight:600;}
        .prog-bar-track{height:8px;background:#e2e8f0;border-radius:7px;overflow:hidden;}
        .prog-bar-fill{height:100%;border-radius:7px;transition:width 0.5s ease;}

        /* Especialidades */
        .esp-tag{background:#fef9c3;color:#854d0e;border:1px solid #fde68a;border-radius:7px;padding:5px 11px;font-size:0.77rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;margin:3px;}
        .esp-tag i{color:#d97706;}

        .esm{text-align:center;padding:16px;color:var(--texto-claro);font-size:0.83rem;}
        .esm i{font-size:1.4rem;margin-bottom:6px;display:block;opacity:0.5;}

        .errb{background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;color:#991b1b;font-size:0.85rem;display:flex;align-items:center;gap:8px;}

        .sc-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Resumen ejecutivo arriba */
        .resumen-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
        .res-stat{background:var(--gris-fondo);border-radius:9px;padding:10px;text-align:center;}
        .res-stat .num{font-size:1.3rem;font-weight:700;color:var(--azul-profundo);}
        .res-stat .lbl{font-size:0.7rem;color:var(--texto-claro);margin-top:2px;}

        /* Apoderado box */
        .apod-box{background:linear-gradient(135deg,#fef9c3,#fef3c7);border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-top:8px;}
        .apod-box .l{font-size:0.7rem;color:#854d0e;text-transform:uppercase;font-weight:700;margin-bottom:5px;}
        .apod-row{display:flex;gap:8px;flex-wrap:wrap;font-size:0.83rem;color:#78350f;}
        .apod-row span{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.5);padding:3px 10px;border-radius:6px;}

        @media(max-width:480px){.info-grid{grid-template-columns:1fr;}.sr{flex-direction:column;}.resumen-grid{grid-template-columns:1fr 1fr;}.tabs-int{flex-wrap:wrap;}.tab-int{flex:1 1 50%;min-width:auto;}}
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0E2586">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ERP Scout">
</head>
<body>
<div class="header"><div class="hi"><div class="lc"><img src="https://i.imgur.com/11u9rUD.png" alt="Logo"></div><h1>Portal de Apoderados</h1><p>Grupo Guías y Scouts Salvador Sanfuentes</p></div></div>
<div class="wrapper">
    <div class="sc">
        <h2><i class="fas fa-search" style="color:var(--azul-claro)"></i> Consultar participante</h2>
        <div class="sr">
            <input type="text" id="q" placeholder="Nombre o RUN del joven..." autocomplete="off" onkeydown="if(event.key==='Enter')buscar()">
            <button class="btn btn-p" id="btnB" onclick="buscar()"><i class="fas fa-search"></i> Buscar</button>
        </div>
        <p style="font-size:0.77rem;color:var(--texto-claro);margin-top:8px;display:flex;align-items:center;gap:5px"><i class="fas fa-shield-alt"></i> Solo se muestran datos del joven consultado.</p>
    </div>
    <div class="aviso"><i class="fas fa-info-circle"></i><span>Portal de solo lectura. Para modificar cualquier dato, contacta a la directiva del grupo.</span></div>
    <div id="res"></div>
</div>

<script>
(async () => {
    const SUPABASE_URL = 'https://hyixmaxhoxvamoecuars.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5aXhtYXhob3h2YW1vZWN1YXJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTg1NDMsImV4cCI6MjA4ODM3NDU0M30.ZLeJIWdip2f00h4TqkZH7eqMX4wpwphaqkJpAa0N0X4';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const COLORES = { Manada:'#FFD100', Tropa:'#2ecc71', 'Compañía':'#2ecc71', Avanzada:'#3498db', Clan:'#E31837', Caminantes:'#E31837', Bandada:'#f39c12' };
    const AREAS = [
        {k:'corporalidad',n:'Corporalidad',ic:'fa-running',c:'#3498db'},
        {k:'creatividad',n:'Creatividad',ic:'fa-palette',c:'#f39c12'},
        {k:'caracter',n:'Carácter',ic:'fa-shield-alt',c:'#E31837'},
        {k:'afectividad',n:'Afectividad',ic:'fa-heart',c:'#e91e63'},
        {k:'sociabilidad',n:'Sociabilidad',ic:'fa-users',c:'#2ecc71'},
        {k:'espiritualidad',n:'Espiritualidad',ic:'fa-dove',c:'#8b5cf6'}
    ];

    window.buscar = async function() {
        const q = document.getElementById('q').value.trim();
        if (!q || q.length < 2) return;

        const btn = document.getElementById('btnB');
        btn.innerHTML = '<span class="sc-spin"></span>';
        btn.disabled = true;

        const res = document.getElementById('res');
        res.innerHTML = '<div style="text-align:center;padding:30px;color:var(--azul-profundo)"><div style="display:inline-block;width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:var(--azul-profundo);border-radius:50%;animation:spin .7s linear infinite"></div><p style="margin-top:10px;font-size:0.85rem">Buscando...</p></div>';

        // Buscar en mmbb_registrations (TODAS las columnas necesarias)
        const runLimpio = q.replace(/\./g, '').replace(/-/g, '');
        const { data: jovenesRaw, error } = await db
            .from('mmbb_registrations')
            .select('*')
            .or(`nombres.ilike.%${q}%,apellidos.ilike.%${q}%,run.ilike.%${runLimpio}%`)
            .limit(5);

        btn.innerHTML = '<i class="fas fa-search"></i> Buscar';
        btn.disabled = false;

        if (error) {
            res.innerHTML = `<div class="errb"><i class="fas fa-exclamation-circle"></i>Error: ${error.message}</div>`;
            return;
        }
        if (!jovenesRaw?.length) {
            res.innerHTML = '<div class="esm" style="background:white;border-radius:10px;padding:30px"><i class="fas fa-user-slash"></i>No se encontró ningún participante con ese dato.</div>';
            return;
        }

        // Mapear a objetos planos para evitar DataCloneError
        const jovenes = jovenesRaw.map(j => ({...j}));

        res.innerHTML = '';
        for (const j of jovenes) res.innerHTML += await renderJoven(j);

        // Activar listeners de tabs
        document.querySelectorAll('.tab-int').forEach(tab => {
            tab.onclick = () => cambiarTab(tab);
        });
    };

    function cambiarTab(tab) {
        const card = tab.closest('.jcard');
        const targetId = tab.dataset.tab;
        card.querySelectorAll('.tab-int').forEach(t => t.classList.remove('act'));
        tab.classList.add('act');
        card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('act'));
        card.querySelector('#' + targetId).classList.add('act');
    }

    async function renderJoven(j) {
        const color = COLORES[j.unidad] || '#3498db';
        const inic = [(j.nombres||'')[0], (j.apellidos||'')[0]].join('').toUpperCase();
        const edad = j.fecha_nacimiento ? Math.floor((Date.now() - new Date(j.fecha_nacimiento)) / (365.25*24*3600*1000)) : null;
        const runL = (j.run||'').replace(/\./g,'').replace(/-/g,'').toUpperCase();
        const cardId = `card-${j.id}`;

        // ── ASISTENCIA: buscar en tabla "jovenes" del evento por email del apoderado ──
        let asistenciaHTML = '';
        let totalEventos = 0, asistidos = 0;
        if (j.apoderado_titular_email) {
            const { data: inscs } = await db
                .from('jovenes')
                .select('nombre_patrulla, grupo_scout, checkin_at, evento_id, confirmado, cuota')
                .ilike('email', j.apoderado_titular_email)
                .order('id', { ascending: false })
                .limit(8);

            if (inscs?.length) {
                totalEventos = inscs.length;
                asistidos = inscs.filter(i => i.confirmado).length;
                const evIds = [...new Set(inscs.map(i => i.evento_id).filter(Boolean))];
                let eMap = {};
                if (evIds.length) {
                    const { data: evs } = await db.from('eventos').select('id,nombre,fecha_inicio,lugar').in('id', evIds);
                    (evs||[]).forEach(e => eMap[e.id] = { id: e.id, nombre: e.nombre, fecha_inicio: e.fecha_inicio, lugar: e.lugar });
                }
                asistenciaHTML = inscs.map(ins => {
                    const ev = eMap[ins.evento_id];
                    const f = ev?.fecha_inicio
                        ? new Date(ev.fecha_inicio + 'T12:00:00').toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' })
                        : 'Sin fecha';
                    const cls = ins.confirmado ? 'ev-pres' : 'ev-pend';
                    const icon = ins.confirmado ? 'fa-check' : 'fa-clock';
                    const lugarStr = ev?.lugar ? ` · ${ev.lugar}` : '';
                    return `<div class="ev-row">
                        <div><div class="ev-nom">${ev?.nombre || 'Evento'}</div><div class="ev-fch">${f}${lugarStr}</div></div>
                        <div class="ev-est ${cls}" title="${ins.confirmado ? 'Asistió' : 'Pendiente'}"><i class="fas ${icon}"></i></div>
                    </div>`;
                }).join('');
            } else {
                asistenciaHTML = '<div class="esm"><i class="fas fa-calendar-times"></i>Sin eventos registrados.</div>';
            }
        } else {
            asistenciaHTML = '<div class="esm"><i class="fas fa-envelope-open"></i>Sin email del apoderado para vincular eventos.</div>';
        }

        // ── PAGOS: tesoreria_movimientos por persona_run ──
        let pagosHTML = '';
        let totalPagado = 0;
        const { data: movs } = await db
            .from('tesoreria_movimientos')
            .select('concepto, monto, fecha, persona_nombre')
            .ilike('persona_run', `%${runL}%`)
            .order('fecha', { ascending: false })
            .limit(8);

        if (movs?.length) {
            totalPagado = movs.reduce((s, m) => s + (parseFloat(m.monto) || 0), 0);
            pagosHTML = movs.map(m => {
                const f = m.fecha ? new Date(m.fecha + 'T12:00:00').toLocaleDateString('es-CL') : '—';
                const monto = parseInt(m.monto || 0).toLocaleString('es-CL');
                return `<div class="pago-row">
                    <div class="pago-info"><div class="pago-desc">${m.concepto || 'Pago'}</div><div class="pago-fch">${f}</div></div>
                    <div class="pago-monto">$${monto}</div>
                </div>`;
            }).join('');
        } else {
            pagosHTML = '<div class="esm"><i class="fas fa-receipt"></i>Sin movimientos registrados.</div>';
        }

        // ── PROGRESIÓN: progresion_jovenes ──
        let progresionHTML = '';
        let especialidadesHTML = '';
        const { data: prog } = await db
            .from('progresion_jovenes')
            .select('*')
            .eq('joven_id', j.id)
            .maybeSingle();

        if (prog) {
            // Mostrar etapa actual + progreso por área
            const etapaActual = prog.etapa_actual || j.adelanto || 'Sin etapa';
            // Calcular progreso por área (territorios)
            const objetivos = prog.territorios?.objetivos || prog.semillero?.objetivos || {};
            const areasBars = AREAS.map(a => {
                const arr = objetivos[a.k] || [];
                const tot = Array.isArray(arr) ? arr.length : 0;
                const done = Array.isArray(arr) ? arr.filter(o => o.logrado).length : 0;
                const pct = tot ? Math.round(done/tot*100) : (typeof prog.territorios?.[a.k] === 'number' ? prog.territorios[a.k] : 0);
                return `<div class="prog-bar-area">
                    <div class="prog-bar-lbl"><span><i class="fas ${a.ic}" style="color:${a.c};margin-right:5px"></i>${a.n}</span><strong style="color:${a.c}">${pct}%</strong></div>
                    <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${pct}%;background:${a.c}"></div></div>
                </div>`;
            }).join('');

            progresionHTML = `
                <div class="ib full" style="background:linear-gradient(135deg,#eef3ff,#ddd6fe);border:1px solid #c7d2fe;text-align:center">
                    <div class="l" style="color:#3730a3">Etapa actual de progresión</div>
                    <div class="v" style="font-size:1.05rem;color:#3730a3">${etapaActual}</div>
                </div>
                <div class="sec" style="margin-top:14px">
                    <div class="sec-titulo"><i class="fas fa-chart-line"></i> Avance por área de desarrollo</div>
                    ${areasBars}
                </div>
            `;

            // Especialidades
            const esps = prog.especialidades || [];
            if (esps.length) {
                especialidadesHTML = `<div class="sec"><div class="sec-titulo"><i class="fas fa-star"></i> Especialidades obtenidas (${esps.length})</div>
                    <div>${esps.map(e => {
                        const nombre = typeof e === 'string' ? e : (e.nombre || 'Especialidad');
                        const fecha = (typeof e === 'object' && e.fecha) ? ` <small style="opacity:0.7">(${new Date(e.fecha).toLocaleDateString('es-CL')})</small>` : '';
                        return `<span class="esp-tag"><i class="fas fa-medal"></i>${nombre}${fecha}</span>`;
                    }).join('')}</div></div>`;
            }
        } else {
            progresionHTML = '<div class="esm"><i class="fas fa-chart-line"></i>Sin registros de progresión aún.</div>';
        }

        return `<div class="jcard" id="${cardId}">
            <!-- HEADER -->
            <div class="jh-card">
                <div class="av" style="background:${color}">
                    ${j.foto_url ? `<img src="${j.foto_url}" alt="">` : inic}
                </div>
                <div class="jinfo" style="flex:1">
                    <h2>${j.nombres} ${j.apellidos}</h2>
                    <p>${j.run || '—'}${edad ? ` · ${edad} años` : ''}</p>
                    <div class="badges">
                        <span class="b">${j.unidad || '—'}</span>
                        ${j.registro_pagado ? '<span class="b b-ok"><i class="fas fa-shield-alt"></i> Seguro vigente</span>' : '<span class="b b-warn"><i class="fas fa-exclamation-triangle"></i> Sin seguro</span>'}
                        ${j.tipo_miembro ? `<span class="b">${j.tipo_miembro}</span>` : ''}
                    </div>
                </div>
            </div>

            <!-- RESUMEN EJECUTIVO -->
            <div style="padding:16px 22px 0">
                <div class="resumen-grid">
                    <div class="res-stat"><div class="num">${totalEventos}</div><div class="lbl">Eventos</div></div>
                    <div class="res-stat"><div class="num">${asistidos}</div><div class="lbl">Asistidos</div></div>
                    <div class="res-stat"><div class="num">${(prog?.especialidades||[]).length}</div><div class="lbl">Especialidades</div></div>
                    <div class="res-stat"><div class="num">$${(totalPagado/1000).toFixed(0)}K</div><div class="lbl">Pagado</div></div>
                </div>
            </div>

            <!-- TABS -->
            <div class="tabs-int">
                <button class="tab-int act" data-tab="tab-general-${j.id}"><i class="fas fa-id-card"></i>General</button>
                <button class="tab-int" data-tab="tab-prog-${j.id}"><i class="fas fa-chart-line"></i>Progresión</button>
                <button class="tab-int" data-tab="tab-eventos-${j.id}"><i class="fas fa-calendar-check"></i>Eventos</button>
                <button class="tab-int" data-tab="tab-pagos-${j.id}"><i class="fas fa-receipt"></i>Pagos</button>
            </div>

            <!-- TAB: GENERAL -->
            <div class="tab-content act" id="tab-general-${j.id}">
                <div class="sec">
                    <div class="sec-titulo"><i class="fas fa-id-card"></i> Datos personales</div>
                    <div class="info-grid">
                        <div class="ib"><div class="l">Nombre social</div><div class="v">${j.nombre_social || '—'}</div></div>
                        <div class="ib"><div class="l">Fecha nacimiento</div><div class="v">${j.fecha_nacimiento ? new Date(j.fecha_nacimiento+'T12:00:00').toLocaleDateString('es-CL') : '—'}</div></div>
                        <div class="ib"><div class="l">Nacionalidad</div><div class="v">${j.nacionalidad || '—'}</div></div>
                        <div class="ib"><div class="l">Religión</div><div class="v">${j.religion || '—'}</div></div>
                        <div class="ib full"><div class="l">Domicilio</div><div class="v">${j.domicilio || '—'}</div></div>
                    </div>
                </div>

                <div class="sec">
                    <div class="sec-titulo"><i class="fas fa-graduation-cap"></i> Información educacional</div>
                    <div class="info-grid">
                        <div class="ib"><div class="l">Institución</div><div class="v">${j.institucion_educacional || '—'}</div></div>
                        <div class="ib"><div class="l">Nivel</div><div class="v">${j.nivel || '—'}</div></div>
                    </div>
                </div>

                <div class="sec">
                    <div class="sec-titulo"><i class="fas fa-campground"></i> Datos del grupo</div>
                    <div class="info-grid">
                        <div class="ib"><div class="l">Unidad</div><div class="v">${j.unidad || '—'}</div></div>
                        <div class="ib"><div class="l">Tipo de miembro</div><div class="v">${j.tipo_miembro || '—'}</div></div>
                        <div class="ib"><div class="l">Fecha ingreso</div><div class="v">${j.fecha_ingreso_grupo ? new Date(j.fecha_ingreso_grupo+'T12:00:00').toLocaleDateString('es-CL') : '—'}</div></div>
                        <div class="ib"><div class="l">Adelanto</div><div class="v">${j.adelanto || '—'}</div></div>
                        <div class="ib ${j.registro_pagado?'ok':'danger'}"><div class="l">Registro anual</div><div class="v">${j.registro_pagado?'✓ Pagado':'✗ Pendiente'}</div></div>
                        <div class="ib ${j.progresion_documento?'ok':''}"><div class="l">Doc. progresión</div><div class="v">${j.progresion_documento?'✓ Firmado':'Pendiente'}</div></div>
                    </div>
                </div>

                <div class="sec">
                    <div class="sec-titulo"><i class="fas fa-tshirt"></i> Talla uniforme</div>
                    <div class="info-grid">
                        <div class="ib"><div class="l">Talla</div><div class="v">${j.talla || '—'}</div></div>
                        <div class="ib"><div class="l">Hombros</div><div class="v">${j.medida_hombros ? j.medida_hombros+' cm' : '—'}</div></div>
                        <div class="ib"><div class="l">Largo</div><div class="v">${j.medida_largo ? j.medida_largo+' cm' : '—'}</div></div>
                    </div>
                </div>
            </div>

            <!-- TAB: PROGRESIÓN -->
            <div class="tab-content" id="tab-prog-${j.id}">
                ${progresionHTML}
                ${especialidadesHTML}
            </div>

            <!-- TAB: EVENTOS -->
            <div class="tab-content" id="tab-eventos-${j.id}">
                <div class="sec">
                    <div class="sec-titulo"><i class="fas fa-calendar-check"></i> Historial de eventos (${totalEventos})</div>
                    ${asistenciaHTML}
                </div>
            </div>

            <!-- TAB: PAGOS -->
            <div class="tab-content" id="tab-pagos-${j.id}">
                <div class="sec">
                    <div class="sec-titulo"><i class="fas fa-receipt"></i> Movimientos en tesorería</div>
                    ${j.monto_pagado ? `<div class="ib ok full" style="margin-bottom:10px"><div class="l">Monto registrado al inscribirse</div><div class="v">$${parseInt(j.monto_pagado).toLocaleString('es-CL')}</div></div>` : ''}
                    ${pagosHTML}
                    ${totalPagado > 0 ? `<div class="ib ok full" style="margin-top:10px;text-align:right"><div class="l">Total pagado en movimientos</div><div class="v" style="font-size:1.1rem">$${totalPagado.toLocaleString('es-CL')}</div></div>` : ''}
                </div>
            </div>

            <!-- TAB: FAMILIA -->
            <div class="tab-content" id="tab-flia-${j.id}" style="display:none"></div>

            <p style="font-size:0.71rem;color:var(--texto-claro);text-align:center;padding:12px;background:#f8fafc;border-top:1px solid var(--gris-claro)"><i class="fas fa-clock"></i> Datos al ${new Date().toLocaleDateString('es-CL')} · Solo lectura</p>
        </div>`;
    }
})();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}</script>
</body>
</html>
